name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: core/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('core/Cargo.lock') }}

      - name: Check formatting
        working-directory: core
        run: cargo fmt --check

      - name: Run clippy
        working-directory: core
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: core
        run: cargo test -- --nocapture

      - name: Build release
        working-directory: core
        run: cargo build --release --verbose

  uniffi-bindings:
    name: UniFFI Bindings
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: core/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('core/Cargo.lock') }}

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/uniffi-bindgen
          key: uniffi-bindgen-0.25-${{ runner.os }}

      - name: Install uniffi-bindgen (pinned version)
        run: cargo install uniffi-bindgen --version 0.25 --locked

      - name: Build UniFFI bindings
        working-directory: .
        run: |
          chmod +x scripts/build-uniffi-bindings.sh
          ./scripts/build-uniffi-bindings.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uniffi-bindings
          path: |
            generated/uniffi/kotlin/
            generated/uniffi/swift/
          retention-days: 7

  build-rust-android:
    name: Build Rust .so (Android NDK)
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-android-${{ hashFiles('core/Cargo.lock') }}

      - name: Cache cargo build (Android)
        uses: actions/cache@v4
        with:
          path: core/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('core/Cargo.lock') }}

      - name: Cache cargo-ndk binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-ndk
          key: cargo-ndk-3.5.4-${{ runner.os }}

      - name: Install cargo-ndk
        run: |
          if ! command -v cargo-ndk >/dev/null 2>&1; then
            cargo install cargo-ndk --version 3.5.4 --locked
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r27
        run: sdkmanager "ndk;27.0.12077973"

      - name: Build Rust Android artifacts
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: bash scripts/build-rust-android.sh

      - name: Upload Android native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-android-native
          path: artifacts/android/
          retention-days: 7

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: [uniffi-bindings, build-rust-android, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download UniFFI bindings
        uses: actions/download-artifact@v4
        with:
          name: uniffi-bindings
          path: generated/uniffi/

      - name: Download Rust Android native
        uses: actions/download-artifact@v4
        with:
          name: rust-android-native
          path: artifacts/android/

      - name: Run Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Verify .so files in APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "APK not found"
            exit 1
          fi
          unzip -l "$APK" | grep "libaletheia_core.so"

  build-rust-ios:
    name: Build Rust .xcframework (iOS)
    runs-on: macos-latest
    needs: [rust-test, uniffi-bindings]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache cargo build (iOS)
        uses: actions/cache@v4
        with:
          path: core/target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('core/Cargo.lock') }}

      - name: Download UniFFI bindings
        uses: actions/download-artifact@v4
        with:
          name: uniffi-bindings
          path: generated/uniffi/

      - name: Build Rust iOS artifacts
        run: bash scripts/build-rust-ios.sh

      - name: Upload iOS native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-ios-native
          path: artifacts/ios/
          retention-days: 7

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    needs: [uniffi-bindings, build-rust-ios, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Download UniFFI artifacts
        uses: actions/download-artifact@v4
        with:
          name: uniffi-bindings
          path: generated/uniffi/

      - name: Download Rust iOS native
        uses: actions/download-artifact@v4
        with:
          name: rust-ios-native
          path: artifacts/ios/

      - name: Run Expo prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Build iOS (archive)
        working-directory: ios
        run: |
          xcodebuild \
            -workspace Aletheia.xcworkspace \
            -scheme Aletheia \
            -configuration Release \
            -destination "generic/platform=iOS" \
            build

  lint:
    name: Quality Gate (Lint + TypeScript + Vitest + Server Smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript check
        run: pnpm tsc --noEmit

      - name: Run Vitest
        run: pnpm test

      - name: Build server bundle
        run: pnpm build

      - name: Smoke server entrypoint
        env:
          JWT_SECRET: ci-smoke-secret
          APP_ID: ci-smoke-app
          OAUTH_SERVER_URL: https://example.invalid
          OWNER_OPEN_ID: ci-owner
          PORT: 3900
        run: |
          timeout 5s node dist/index.js
          code=$?
          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            exit "$code"
          fi
