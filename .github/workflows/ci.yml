name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: core/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('core/Cargo.lock') }}

      - name: Check formatting
        working-directory: core
        run: cargo fmt --check

      - name: Run clippy
        working-directory: core
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: core
        run: cargo test -- --nocapture

      - name: Build release
        working-directory: core
        run: cargo build --release --verbose

  uniffi-bindings:
    name: UniFFI Bindings
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: core/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('core/Cargo.lock') }}

      - name: Build UniFFI bindings
        working-directory: .
        run: |
          chmod +x scripts/build-uniffi-bindings.sh
          ./scripts/build-uniffi-bindings.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uniffi-bindings
          path: |
            generated/uniffi/kotlin/
            generated/uniffi/swift/
          retention-days: 7

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: uniffi-bindings
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Download UniFFI artifacts
        uses: actions/download-artifact@v4
        with:
          name: uniffi-bindings
          path: generated/uniffi/

      - name: Build Android
        working-directory: android
        run: ./gradlew assembleRelease

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    needs: uniffi-bindings
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Download UniFFI artifacts
        uses: actions/download-artifact@v4
        with:
          name: uniffi-bindings
          path: generated/uniffi/

      - name: Build iOS
        working-directory: ios
        run: xcodebuild -workspace Aletheia.xcworkspace -scheme Aletheia -configuration Release build

  lint:
    name: Lint (ESLint + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript check
        run: pnpm tsc --noEmit
