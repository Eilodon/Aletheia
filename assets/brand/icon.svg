<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="56%">
      <stop offset="0%" stop-color="#181228"/>
      <stop offset="60%" stop-color="#0E0B1A"/>
      <stop offset="100%" stop-color="#080610"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="46%" r="42%">
      <stop offset="0%"   stop-color="#C4A455" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#C4A455" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C4A455" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softBloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ambientBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
    <clipPath id="frame">
      <rect width="1024" height="1024" rx="234"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">

    <!-- ── Background ── -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Ambient centre glow -->
    <ellipse cx="512" cy="490" rx="310" ry="290"
             fill="#C4A455" opacity="0.13" filter="url(#ambientBlur)"/>

    <!-- Subtle noise grain overlay via tiny dots -->
    <rect width="1024" height="1024" fill="none"
          stroke="#C4A455" stroke-width="0" opacity="0.04"/>

    <!-- ── Outer ring ornaments ── -->
    <circle cx="512" cy="512" r="460"
            fill="none" stroke="#C4A455" stroke-width="0.7" stroke-opacity="0.10"/>
    <circle cx="512" cy="512" r="438"
            fill="none" stroke="#C4A455" stroke-width="0.4" stroke-opacity="0.06"/>

    <!-- ── Core ambient fill (very subtle) ── -->
    <circle cx="512" cy="512" r="320" fill="url(#coreGlow)"/>

    <!-- ══════════════════════════════════════════
         TRIANGLE  —  equilateral, upright
         top: (512, 158)
         bl:  (188, 720)   br: (836, 720)
         height: 562   side: ~648
    ══════════════════════════════════════════ -->

    <!-- Inner echo triangle (centroid-scaled 50%) -->
    <!-- top: (512,347)  bl:(350,626)  br:(674,626) -->
    <path d="M512 347 L674 626 L350 626 Z"
          fill="none"
          stroke="#C4A455"
          stroke-width="1.0"
          stroke-linejoin="round"
          opacity="0.18"/>

    <!-- Main triangle -->
    <path d="M512 158 L836 720 L188 720 Z"
          fill="none"
          stroke="#C4A455"
          stroke-width="3.2"
          stroke-linejoin="round"
          stroke-linecap="round"
          opacity="0.90"
          filter="url(#glow)"/>

    <!-- Mirror axis — vertical -->
    <line x1="512" y1="158" x2="512" y2="720"
          stroke="#C4A455" stroke-width="0.9" stroke-opacity="0.24"/>

    <!-- ── Crossbar / mirror horizon — at 56 % from top, y ≈ 473 ──
         Width at y=473: base × (473−158)/562 = 648 × 0.56 = 363, half=181.5
         From (330, 473) to (694, 473)                                       -->
    <line x1="330" y1="473" x2="694" y2="473"
          stroke="#C4A455" stroke-width="1.3" stroke-opacity="0.30"/>

    <!-- ── Eye — horizontal ellipse at crossbar ── -->
    <ellipse cx="512" cy="473"
             rx="74" ry="29"
             fill="none"
             stroke="#C4A455"
             stroke-width="2.4"
             opacity="0.92"
             filter="url(#glow)"/>

    <!-- Eye — iris fill (subtle) -->
    <ellipse cx="512" cy="473"
             rx="74" ry="29"
             fill="#C4A455"
             opacity="0.04"/>

    <!-- Eye — pupil ring -->
    <circle cx="512" cy="473" r="16"
            fill="none"
            stroke="#C4A455"
            stroke-width="1.4"
            opacity="0.50"/>

    <!-- Eye — pupil filled -->
    <circle cx="512" cy="473" r="10"
            fill="#C4A455"
            opacity="0.96"
            filter="url(#softBloom)"/>

    <!-- Eye — inner void -->
    <circle cx="512" cy="473" r="4"
            fill="#0C0912"/>

    <!-- ── Vertex ornaments ── -->

    <!-- Top vertex -->
    <circle cx="512" cy="158" r="14"
            fill="none" stroke="#C4A455" stroke-width="0.9" opacity="0.28"/>
    <circle cx="512" cy="158" r="7"
            fill="#C4A455" opacity="0.92" filter="url(#softBloom)"/>

    <!-- Bottom-left vertex -->
    <circle cx="188" cy="720" r="14"
            fill="none" stroke="#C4A455" stroke-width="0.9" opacity="0.28"/>
    <circle cx="188" cy="720" r="7"
            fill="#C4A455" opacity="0.92" filter="url(#softBloom)"/>

    <!-- Bottom-right vertex -->
    <circle cx="836" cy="720" r="14"
            fill="none" stroke="#C4A455" stroke-width="0.9" opacity="0.28"/>
    <circle cx="836" cy="720" r="7"
            fill="#C4A455" opacity="0.92" filter="url(#softBloom)"/>

    <!-- Base midpoint — subtle -->
    <circle cx="512" cy="720" r="3.5"
            fill="#C4A455" opacity="0.40"/>

    <!-- ── Four cardinal tick marks on outer ring ── -->
    <line x1="512" y1="44"  x2="512" y2="62"
          stroke="#C4A455" stroke-width="1.2" stroke-opacity="0.22"/>
    <line x1="512" y1="962" x2="512" y2="980"
          stroke="#C4A455" stroke-width="1.2" stroke-opacity="0.22"/>
    <line x1="44"  y1="512" x2="62"  y2="512"
          stroke="#C4A455" stroke-width="1.2" stroke-opacity="0.22"/>
    <line x1="962" y1="512" x2="980" y2="512"
          stroke="#C4A455" stroke-width="1.2" stroke-opacity="0.22"/>

  </g>
</svg>
